name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # run daily at midnight UTC
  workflow_dispatch: # allow manual trigger
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"

permissions:
  contents: write # allow pushing to output branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # Light mode snake (White background, grey dots, black snake)
            dist/github-contribution-grid-snake.svg?color_snake=#000000&color_dots=#ebedf0,#d9d9d9,#b3b3b3,#808080,#4d4d4d

            # Dark mode snake (Charcoal background, monochrome dots, white snake)
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ffffff&color_dots=#222222,#404040,#5e5e5e,#8c8c8c,#bfbfbf

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
